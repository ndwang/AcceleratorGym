machine:
  name: Mock FODO Cell
  description: FODO lattice using the mock backend (no real simulator needed)

backend:
  type: mock

devices:
  magnets:
    quadrupole:
      QF:
        description: "Focusing quadrupole"
        attributes:
          K1:
            description: "Integrated strength"
            units: "1/m"
            limits: [0.0, 5.0]
            read: true
            write: true
      QD:
        description: "Defocusing quadrupole"
        attributes:
          K1:
            description: "Integrated strength"
            units: "1/m"
            limits: [-5.0, 0.0]
            read: true
            write: true
  diagnostics:
    monitor:
      BPM1:
        description: "Beam position monitor 1"
        attributes:
          orbit.x:
            description: "Horizontal beam position"
            units: "mm"
            read: true
            write: false
          orbit.y:
            description: "Vertical beam position"
            units: "mm"
            read: true
            write: false
          phase.a:
            description: "Horizontal betatron phase"
            units: "2pi"
            read: true
            write: false
          phase.b:
            description: "Vertical betatron phase"
            units: "2pi"
            read: true
            write: false
